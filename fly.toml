# fly.toml
app = 'unilearn'
primary_region = 'cdg'

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  ACCESS_TOKEN_EXPIRE_MINUTES = "15"

[http_service]
  internal_port = 8080 
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  port = 8080 
  type = "http"
  interval = 10000
  timeout = 5000
  grace_period = "30s"
  path = "/health"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
  processes = ['app']
